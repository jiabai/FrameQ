# FrameQ server Nginx reverse proxy.
# FrameQ production domain: frameq.8xf.pro.

upstream frameq_server {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name frameq.8xf.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name frameq.8xf.pro;

    ssl_certificate /etc/letsencrypt/live/frameq.8xf.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/frameq.8xf.pro/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:frameq_ssl:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/frameq.access.log;
    error_log /var/log/nginx/frameq.error.log warn;

    client_max_body_size 1m;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /health/live {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location = /health/ready {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location = /login {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location ^~ /auth/ {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location ^~ /api/desktop/ {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    # Optional WeChat Pay callback. Keep this path public only when WECHAT_PAY_ENABLED=1.
    location = /api/wechat/notify {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location = /admin {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
    }

    location ^~ /admin/ {
        proxy_pass http://frameq_server;
        include /etc/nginx/snippets/frameq-proxy-headers.conf;
        # Optional extra hardening:
        # allow 203.0.113.10;
        # deny all;
    }

    location / {
        return 404;
    }
}
