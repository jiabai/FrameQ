name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string
      release_draft:
        description: "Create or update the release as a draft"
        required: true
        default: true
        type: boolean
      build_windows_updater:
        description: "Build and upload the Windows installer and updater artifacts"
        required: true
        default: true
        type: boolean
      build_macos_x64:
        description: "Build and upload the macOS Intel DMG"
        required: true
        default: true
        type: boolean
      build_macos_arm64:
        description: "Build and upload the macOS Apple Silicon DMG"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  windows-updater-artifacts:
    name: Windows updater artifacts
    if: ${{ github.event_name == 'push' || inputs.build_windows_updater }}
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_DRAFT: ${{ github.event_name == 'push' || inputs.release_draft }}
      FRAMEQ_PYTHON_STANDALONE_URL: ${{ secrets.FRAMEQ_PYTHON_STANDALONE_URL }}
      FRAMEQ_FFMPEG_ARCHIVE_URL: ${{ secrets.FRAMEQ_FFMPEG_ARCHIVE_URL }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install frontend dependencies
        run: npm ci --prefix app

      - name: Prepare bundled runtime resources
        shell: cmd
        run: node scripts\build-installer.mjs --target windows-x64 --skip-tauri-build

      - name: Build and upload signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          tauriScript: npm run tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "FrameQ ${{ env.RELEASE_TAG }}"
          releaseBody: "FrameQ desktop installer and Tauri updater artifacts."
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: false
          releaseCommitish: ${{ github.sha }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles nsis --target x86_64-pc-windows-msvc

      - name: Normalize updater manifest encoding
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set "MANIFEST_DIR=%RUNNER_TEMP%\frameq-updater-manifest"
          if not exist "%MANIFEST_DIR%" mkdir "%MANIFEST_DIR%"
          gh release download "%RELEASE_TAG%" --pattern "latest.json" --dir "%MANIFEST_DIR%" --clobber
          node scripts\normalize-updater-manifest.mjs "%MANIFEST_DIR%\latest.json"
          gh release upload "%RELEASE_TAG%" "%MANIFEST_DIR%\latest.json" --clobber

  macos-x64-dmg-artifact:
    name: macOS Intel DMG artifact
    needs: windows-updater-artifacts
    if: ${{ always() && (github.event_name == 'push' || inputs.build_macos_x64) && (needs.windows-updater-artifacts.result == 'success' || needs.windows-updater-artifacts.result == 'skipped') }}
    runs-on: macos-15-intel
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      FRAMEQ_PYTHON_STANDALONE_URL: ${{ secrets.FRAMEQ_PYTHON_STANDALONE_URL_MACOS_X64 }}
      FRAMEQ_FFMPEG_ARCHIVE_URL: ${{ secrets.FRAMEQ_FFMPEG_ARCHIVE_URL_MACOS_X64 }}
      FRAMEQ_FFPROBE_ARCHIVE_URL: ${{ secrets.FRAMEQ_FFPROBE_ARCHIVE_URL_MACOS_X64 }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install frontend dependencies
        run: npm ci --prefix app

      - name: Prepare bundled runtime resources
        run: node scripts/build-installer.mjs --target macos-x64 --skip-tauri-build

      - name: Build macOS Intel app bundle
        run: npm --prefix app run tauri -- build --bundles app --target x86_64-apple-darwin

      - name: Verify packaged runtime imports end to end
        run: |
          RES="app/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/FrameQ.app/Contents/Resources/resources"
          PYTHONPATH="$RES/worker" "$RES/python/bin/python3" -c "import funasr, modelscope, yt_dlp; import frameq_worker; print('bundled runtime import OK')"

      - name: Package macOS Intel DMG
        run: bash scripts/make-macos-dmg.sh x86_64-apple-darwin FrameQ

      - name: Upload macOS Intel DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg --clobber

  macos-arm64-dmg-artifact:
    name: macOS Apple Silicon DMG artifact
    needs: windows-updater-artifacts
    if: ${{ always() && (github.event_name == 'push' || inputs.build_macos_arm64) && (needs.windows-updater-artifacts.result == 'success' || needs.windows-updater-artifacts.result == 'skipped') }}
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      FRAMEQ_PYTHON_STANDALONE_URL: ${{ secrets.FRAMEQ_PYTHON_STANDALONE_URL_ARM64 }}
      FRAMEQ_FFMPEG_ARCHIVE_URL: ${{ secrets.FRAMEQ_FFMPEG_ARCHIVE_URL_ARM64 }}
      FRAMEQ_FFPROBE_ARCHIVE_URL: ${{ secrets.FRAMEQ_FFPROBE_ARCHIVE_URL_ARM64 }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install frontend dependencies
        run: npm ci --prefix app

      - name: Prepare bundled runtime resources
        run: node scripts/build-installer.mjs --target macos-arm64 --skip-tauri-build

      - name: Build macOS Apple Silicon app bundle
        run: npm --prefix app run tauri -- build --bundles app --target aarch64-apple-darwin

      - name: Verify packaged runtime imports end to end
        run: |
          RES="app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/FrameQ.app/Contents/Resources/resources"
          PYTHONPATH="$RES/worker" "$RES/python/bin/python3" -c "import funasr, modelscope, yt_dlp; import frameq_worker; print('bundled runtime import OK')"

      - name: Package macOS Apple Silicon DMG
        run: bash scripts/make-macos-dmg.sh aarch64-apple-darwin FrameQ

      - name: Upload macOS Apple Silicon DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg --clobber
