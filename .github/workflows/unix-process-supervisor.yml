name: macOS ProcessSupervisor

on:
  push:
    branches:
      - main
    paths:
      - "app/src-tauri/**"
      - ".github/workflows/unix-process-supervisor.yml"
  pull_request:
    paths:
      - "app/src-tauri/**"
      - ".github/workflows/unix-process-supervisor.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unix-process-supervisor-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-test:
    name: macOS Cargo tests
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tauri Rust tests
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --manifest-path app/src-tauri/Cargo.toml
